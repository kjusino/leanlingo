<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#0d1626" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f6f8fc" media="(prefers-color-scheme: light)" />
    <meta name="description" content="LeanLingo — open Lean 4 flashcard trainer. Practice Lean 4 syntax, tactics, and proofs anywhere." />
    <meta property="og:title" content="LeanLingo" />
    <meta property="og:description" content="Open Lean 4 flashcard trainer. Practice from the official Lean books." />
    <meta property="og:url" content="https://leanlingo.org" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://leanlingo.org/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="LeanLingo — Lean 4 trainer. 20 chapters, 149 lessons, 405 questions." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LeanLingo" />
    <meta name="twitter:description" content="Open Lean 4 flashcard trainer. Practice from the official Lean books." />
    <meta name="twitter:image" content="https://leanlingo.org/og.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>LeanLingo — open Lean 4 trainer</title>
    <script>
      // Apply the persisted theme before the first paint so there's no flash.
      (function () {
        try {
          var t = localStorage.getItem('leanlingo:theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark';
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
